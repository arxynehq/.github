<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter, sans-serif">
  <!-- Background -->
  <rect width="720" height="320" fill="#0A0A0A" rx="12"/>
  
  <!-- Platform box -->
  <rect x="40" y="30" width="640" height="60" fill="none" stroke="#00E5FF" stroke-width="2" rx="8"/>
  <text x="360" y="68" fill="#FFFFFF" font-size="22" font-weight="800" text-anchor="middle">Arxyne Platform</text>
  
  <!-- Four pillars -->
  <rect x="40" y="110" width="148" height="80" fill="#0A0A0A" stroke="#00E5FF" stroke-width="1.5" rx="6"/>
  <text x="114" y="145" fill="#00E5FF" font-size="16" font-weight="700" text-anchor="middle">Agents</text>
  <text x="114" y="170" fill="#666666" font-size="13" text-anchor="middle">LLM</text>
  
  <rect x="204" y="110" width="148" height="80" fill="#0A0A0A" stroke="#00E5FF" stroke-width="1.5" rx="6"/>
  <text x="278" y="145" fill="#00E5FF" font-size="16" font-weight="700" text-anchor="middle">Solvers</text>
  <text x="278" y="170" fill="#666666" font-size="13" text-anchor="middle">Docker</text>
  
  <rect x="368" y="110" width="148" height="80" fill="#0A0A0A" stroke="#00E5FF" stroke-width="1.5" rx="6"/>
  <text x="442" y="145" fill="#00E5FF" font-size="16" font-weight="700" text-anchor="middle">USD</text>
  <text x="442" y="170" fill="#666666" font-size="13" text-anchor="middle">Digital Twins</text>
  
  <rect x="532" y="110" width="148" height="80" fill="#0A0A0A" stroke="#00E5FF" stroke-width="1.5" rx="6"/>
  <text x="606" y="145" fill="#00E5FF" font-size="16" font-weight="700" text-anchor="middle">Telemetry</text>
  <text x="606" y="170" fill="#666666" font-size="13" text-anchor="middle">Live Data</text>
  
  <!-- Connector line -->
  <line x1="40" y1="210" x2="680" y2="210" stroke="#00E5FF" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Bottom: domains -->
  <rect x="40" y="230" width="640" height="60" fill="none" stroke="#666666" stroke-width="1.5" rx="8"/>
  <text x="360" y="265" fill="#FFFFFF" font-size="16" font-weight="600" text-anchor="middle">Vehicles · Aircraft · Robotics · Marine · Energy</text>
</svg>